<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle Financeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <h1>Meu Controle Financeiro</h1>
            <p>Faça login para acessar seus dados de forma segura.</p>
            <button id="btnLoginGoogle" class="btn-google">
                <!-- Ícone SVG Oficial do Google inserido diretamente no código -->
                <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                Entrar com o Google
            </button>
        </div>
    </div>

    <!-- APLICAÇÃO PRINCIPAL -->
    <div id="mainApp" style="display: none; width: 100%;">
        <button class="menu-toggle" id="menuToggle">☰ Menu</button>

        <aside class="sidebar" id="sidebar">
            <h2>Meus Ciclos</h2>
            <div id="listaMeses"></div>
            <hr style="border: 1px solid var(--primary-color); margin: 20px 0; width: 100%;">
            <button id="btnSair" class="mes-btn" style="color: #db7093;">Sair da Conta</button>
        </aside>

        <main class="main-content">
            <h1 id="tituloMes">Meu Controle Financeiro</h1>

            <div class="container" id="areaFormulario">
                <div class="card form-container">
                    <h3 id="tituloFormulario">Adicionar Nova Transação</h3>
                    <form id="formTransacao">
                        <div class="input-group">
                            <label for="tipo">Tipo:</label>
                            <select id="tipo" required>
                                <option value="receita">Salário / Receita</option>
                                <option value="gasto">Gasto do Ciclo (Variável)</option>
                                <option value="fixa">Conta Fixa do Ciclo</option>
                                <option value="investimento">Aporte de Investimento (Novo valor)</option>
                                <option value="rendimento">Rendimento (Lucro do ativo)</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="descricao">Descrição (Ativo ou Conta):</label>
                            <input type="text" id="descricao" placeholder="Ex: Supermercado, PETR4..." required>
                        </div>

                        <div class="input-group">
                            <label for="valor">Valor (R$):</label>
                            <input type="number" id="valor" placeholder="Ex: 150.00" step="0.01" min="0.01" required>
                        </div>

                        <button type="submit" id="btnSubmit">Adicionar</button>
                    </form>
                </div>
            </div>

            <div class="container">
                <div class="dashboard">
                    <div class="chart-container">
                        <h3>Recebido vs Comprometido</h3>
                        <div id="boxReceitas" class="canvas-box"></div>
                    </div>
                    
                    <div class="chart-container">
                        <h3>Gastos e Fixas</h3>
                        <div id="boxGastos" class="canvas-box"></div>
                    </div>

                    <div class="chart-container">
                        <h3>Investimentos Totais</h3>
                        <div id="boxInvestimentos" class="canvas-box"></div>
                    </div>
                </div>

                <div class="card historico-container">
                    <h3>Extrato Detalhado</h3>
                    <div class="table-responsive">
                        <table id="tabelaHistorico">
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Tipo</th>
                                    <th>Descrição</th>
                                    <th>Valor</th>
                                    <th id="colAcoes" style="text-align: center;">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="corpoHistorico"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- O JS é carregado como módulo -->
    <script type="module" src="script.js"></script>
</body>
</html>
